spring.application.name=atlas-hr

# CORS
app.cors.allowed-origin-patterns=*

# JWT
jwt.secret=${JWT_SECRET_KEY:ZGVmYXVsdC1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5LWNoYW5nZS1pbi1wcm9kdWN0aW9u}
jwt.expiration=86400000

# Base de datos
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/atlashr}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
